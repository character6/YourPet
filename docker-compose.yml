services:
  postgres:
    image: postgres:16-alpine
    container_name: yourpet-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: yourpet
      POSTGRES_PASSWORD: yourpet
      POSTGRES_DB: yourpet
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
